<svg width="100%" viewBox="0 0 680 120" xmlns="http://www.w3.org/2000/svg">

<defs>
<linearGradient id="glassFill" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#e0e0e0" stop-opacity="0.15"/>
<stop offset="50%" stop-color="#ffffff" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#c0c0c0" stop-opacity="0.12"/>
</linearGradient>
<linearGradient id="glassEdge" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#000000" stop-opacity="0.25"/>
<stop offset="40%" stop-color="#000000" stop-opacity="0.08"/>
<stop offset="60%" stop-color="#000000" stop-opacity="0.05"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0.20"/>
</linearGradient>
<linearGradient id="glassShine" x1="0.2" y1="0" x2="0.8" y2="1">
<stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
<stop offset="40%" stop-color="#ffffff" stop-opacity="0.05"/>
<stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>
<clipPath id="bClip">
<rect x="236" y="24" width="56" height="56" rx="16"/>
</clipPath>
</defs>

<!-- Glass bubble background -->
<rect x="236" y="24" width="56" height="56" rx="16" fill="url(#glassFill)"/>
<!-- Glass shine highlight -->
<ellipse cx="258" cy="35" rx="18" ry="8" fill="url(#glassShine)" clip-path="url(#bClip)"/>
<!-- Glass edge border -->
<rect x="236" y="24" width="56" height="56" rx="16" fill="none" stroke="url(#glassEdge)" stroke-width="1.2"/>

<!-- Waveform lines - black (centered in bubble) -->
<rect x="245.5" y="47" width="5" height="10" rx="2.5" fill="#000000" opacity="0.85"/>
<rect x="253.5" y="42" width="5" height="20" rx="2.5" fill="#000000" opacity="0.9"/>
<rect x="261.5" y="37" width="5" height="30" rx="2.5" fill="#000000" opacity="1"/>
<rect x="269.5" y="43" width="5" height="18" rx="2.5" fill="#000000" opacity="0.9"/>
<rect x="277.5" y="48" width="5" height="8" rx="2.5" fill="#000000" opacity="0.85"/>

<!-- Noted text - black -->
<text x="302" y="68" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="42" font-weight="500" letter-spacing="1" fill="#000000">Noted</text>

</svg>
