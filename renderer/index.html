<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noted</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <div id="titlebar">
      <div id="titlebar-drag">
        <div id="app-icon">N</div>
        <span id="app-title">Noted</span>
        <span id="status-badge">Ready</span>
      </div>
      <div id="titlebar-controls">
        <button id="btn-minimize" class="titlebar-btn" title="Hide (Cmd+Shift+Space)">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="2" rx="1" fill="currentColor"/></svg>
        </button>
        <button id="btn-close" class="titlebar-btn btn-close" title="Close">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <!-- Chat Area -->
    <div id="chat-container">
      <div id="welcome" class="welcome-screen">
        <div class="welcome-icon">N</div>
        <h2>Welcome to Noted</h2>
        <p>Your AI-powered desktop assistant</p>
        <div class="shortcuts-hint">
          <div class="shortcut"><kbd>⌘</kbd><kbd>⇧</kbd><kbd>Space</kbd> Toggle overlay</div>
          <div class="shortcut"><kbd>⌘</kbd><kbd>⇧</kbd><kbd>H</kbd> Screenshot + Ask</div>
        </div>
      </div>
      <div id="messages"></div>
    </div>

    <!-- Input Area -->
    <div id="input-area">
      <div id="screenshot-preview" class="hidden">
        <img id="screenshot-img" />
        <button id="remove-screenshot" title="Remove screenshot">&times;</button>
      </div>
      <div id="input-row">
        <button id="btn-screenshot" class="action-btn" title="Capture screen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <textarea id="input" placeholder="Ask anything... (Enter to send)" rows="1"></textarea>
        <button id="btn-send" class="action-btn send-btn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div id="input-hint">
        <span>Enter to send · Shift+Enter for new line · Screenshots auto-attach context</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
